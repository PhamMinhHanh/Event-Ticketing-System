{% extends 'base.html' %}

{% block navbar %}{% endblock %}

{% block title %}Đăng ký - EventBox{% endblock %}

{% block styles %}
<style>
    /* Tương tự trang Login */
    .auth-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    .register-card {
        background: #fff;
        border-radius: 1.5rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 550px;
        border: 1px solid #e9ecef;
        position: relative; /* Cần thiết để nút X định vị đúng */
    }
    .brand-title { color: #0d6efd; font-weight: 800; font-size: 2rem; }
    .nav-pills .nav-link { border-radius: 50px; padding: 0.5rem 1.5rem; font-weight: 500; }
    .btn-close-custom {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 1.5rem;
        color: #6c757d;
        text-decoration: none;
        font-weight: bold;
    }
    .btn-close-custom:hover {
        color: #343a40;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="register-card shadow-sm">
        
        <a href="{{ url_for('main.index') }}" class="btn-close-custom" title="Về trang chủ">&times;</a>

        <div class="text-center mb-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none">
                <h1 class="brand-title mb-1">EventBox</h1>
            </a>
            <p class="text-muted">Tham gia cộng đồng sự kiện ngay hôm nay</p>
        </div>

        <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-pill" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="tab-user" type="button" onclick="setRole('USER')">Khách hàng</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-org" type="button" onclick="setRole('ORGANIZER')">Nhà tổ chức</button>
            </li>
        </ul>

        <form action="{{ url_for('main.register') }}" method="POST">
            <!-- Input ẩn lưu trữ role -->
            <input type="hidden" name="role" id="role-input" value="USER">

            <!-- Ô Họ và tên (Dành cho USER) -->
            <div class="mb-3" id="fullname-field">
                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                <input type="text" name="full_name" class="form-control" id="input-fullname" required>
            </div>

            <!-- Ô Tên tổ chức (Dành cho ORGANIZER - Mặc định ẩn và bị vô hiệu hóa) -->
            <div class="mb-3 d-none" id="org-name-field">
                <label class="form-label">Tên đơn vị tổ chức <span class="text-danger">*</span></label>
                <input type="text" name="organization_name" class="form-control" id="input-orgname" disabled required>
            </div>

            <!-- CÁC TRƯỜNG DÙNG CHUNG -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Đăng ký tài khoản</button>
            
            <p class="text-center mt-4 mb-0 small">
                Đã có tài khoản? <a href="{{ url_for('main.login') }}" class="text-decoration-none">Đăng nhập</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function setRole(role) {
        // 1. Cập nhật value cho form
        document.getElementById('role-input').value = role;

        // 2. Lấy các elements
        const tabUser = document.getElementById('tab-user');
        const tabOrg = document.getElementById('tab-org');
        
        const fullnameField = document.getElementById('fullname-field');
        const inputFullname = document.getElementById('input-fullname');
        
        const orgNameField = document.getElementById('org-name-field');
        const inputOrgname = document.getElementById('input-orgname');

        // 3. Xử lý logic ẩn/hiện và chuyển class "active"
        if (role === 'USER') {
            // Chuyển màu Tab
            tabUser.classList.add('active');
            tabOrg.classList.remove('active');
            
            // Hiện Họ Tên, Bật input Họ tên
            fullnameField.classList.remove('d-none');
            inputFullname.disabled = false;
            
            // Ẩn Tổ chức, Vô hiệu hóa input Tổ chức
            orgNameField.classList.add('d-none');
            inputOrgname.disabled = true;
        } else {
            // Chuyển màu Tab
            tabOrg.classList.add('active');
            tabUser.classList.remove('active');
            
            // Hiện Tổ chức, Bật input Tổ chức
            orgNameField.classList.remove('d-none');
            inputOrgname.disabled = false;
            
            // Ẩn Họ tên, Vô hiệu hóa input Họ tên
            fullnameField.classList.add('d-none');
            inputFullname.disabled = true;
        }
    }
</script>
{% endblock %}

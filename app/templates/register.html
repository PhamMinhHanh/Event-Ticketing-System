{% extends 'base.html' %}

{% block navbar %}{% endblock %}

{% block title %}Đăng ký - EventBox{% endblock %}

{% block styles %}
<style>
    /* Tương tự trang Login */
    .auth-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    .register-card {
        background: #fff;
        border-radius: 1.5rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 550px;
        border: 1px solid #e9ecef;
        position: relative; /* Cần thiết để nút X định vị đúng */
    }
    .brand-title { color: #0d6efd; font-weight: 800; font-size: 2rem; }
    .nav-pills .nav-link { border-radius: 50px; padding: 0.5rem 1.5rem; font-weight: 500; }
    .btn-close-custom {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 1.5rem;
        color: #6c757d;
        text-decoration: none;
        font-weight: bold;
    }
    .btn-close-custom:hover {
        color: #343a40;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="register-card shadow-sm">
        
        <a href="{{ url_for('main.index') }}" class="btn-close-custom" title="Về trang chủ">&times;</a>

        <div class="text-center mb-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none">
                <h1 class="brand-title mb-1">EventBox</h1>
            </a>
            <p class="text-muted">Tham gia cộng đồng sự kiện ngay hôm nay</p>
        </div>

        <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-pill" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" type="button" onclick="setRole('USER')">Khách hàng</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" type="button" onclick="setRole('ORGANIZER')">Nhà tổ chức</button>
            </li>
        </ul>

        <form action="{{ url_for('main.register') }}" method="POST">
            <input type="hidden" name="role" id="role-input" value="USER">
            
            <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>

            <div class="mb-3 d-none" id="org-name-field">
                <label class="form-label">Tên đơn vị tổ chức</label>
                <input type="text" name="org_name" class="form-control">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Đăng ký tài khoản</button>
            
            <p class="text-center mt-4 mb-0 small">
                Đã có tài khoản? <a href="{{ url_for('main.login') }}" class="text-decoration-none">Đăng nhập</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function setRole(role) {
        document.getElementById('role-input').value = role;
        const orgField = document.getElementById('org-name-field');
        const navLinks = document.querySelectorAll('.nav-link');
        
        // Đổi màu tab
        navLinks.forEach(link => link.classList.remove('active'));
        event.target.classList.add('active');

        // Hiện/ẩn form nhà tổ chức
        if(role === 'ORGANIZER') {
            orgField.classList.remove('d-none');
            orgField.querySelector('input').setAttribute('required', 'required');
        } else {
            orgField.classList.add('d-none');
            orgField.querySelector('input').removeAttribute('required');
        }
    }
</script>
{% endblock %}
